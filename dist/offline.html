<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Scholar Awards</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; margin: 0; padding: 2rem; background: #f8f9fa; color: #1f2937; }
      .card { max-width: 560px; margin: 10vh auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 1.25rem; }
      h1 { font-size: 1.2rem; margin: 0 0 0.5rem; }
      p { margin: 0.3rem 0; line-height: 1.45; }
      .tag { display: inline-block; margin-top: 0.8rem; background: #f59e0b; color: #111827; padding: 0.25rem 0.6rem; border-radius: 999px; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>The app shell is available for planning mode.</p>
      <p>Live event actions require a real-time connection and are temporarily unavailable.</p>
      <span class="tag">Reconnect to continue live mode</span>
    </div>
  </body>
</html>
